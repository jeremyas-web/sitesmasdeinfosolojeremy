<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facturación</title>
    <link rel="stylesheet" href="modulo3-styles.css">
</head>

<body>

<h1>Facturación</h1>

<form>

<!-- BUSCAR MESA -->
<div class="grid">
    <input type="number" id="mesaBuscar" placeholder="Número de mesa" required>
    <button type="button" onclick="buscarPedidos()">Buscar</button>
</div>

<h2>Pedidos encontrados</h2>

<!-- TABLA COMPLETA -->
<table>
    <thead>
        <tr>
            <th>Código</th>
            <th>Mozo</th>
            <th>Plato</th>
            <th>Cantidad</th>
            <th>P. Unitario</th>
            <th>Subtotal</th>
            <th>Observaciones</th>
        </tr>
    </thead>
    <tbody id="tablaPedidos"></tbody>
</table>

<!-- SUBTOTAL -->
<div class="resumen">
    <span>Subtotal:</span>
    <span>S/ <span id="subtotal">0.00</span></span>
</div>

<!-- IGV -->
<div class="resumen">
    <span>IGV (18%):</span>
    <span>S/ <span id="igv">0.00</span></span>
</div>

<!-- DESCUENTO -->
<div class="grid">
    <input type="number" id="descuento" placeholder="Descuento" min="0">
    <input type="text" id="justDesc" placeholder="Justificación (mín. 10 caracteres)" style="display:none;">
</div>

<!-- TOTAL -->
<div class="resumen">
    <span>Total:</span>
    <span>S/ <span id="total">0.00</span></span>
</div>

<!-- MÉTODO DE PAGO -->
<div class="grid">
    <select id="metodo" required>
        <option value="">Seleccione método</option>
        <option>Efectivo</option>
        <option>Tarjeta</option>
        <option>Yape</option>
        <option>Plin</option>
        <option>Transferencia</option>
    </select>

    <input type="number" id="recibido" placeholder="Monto recibido">
</div>

<!-- VUELTO -->
<div class="resumen">
    <span>Vuelto:</span>
    <span>S/ <span id="vuelto">0.00</span></span>
</div>

<!-- ESTADO -->
<div class="grid">
    <label>Estado:</label>
    <select id="estado">
        <option>Pendiente de pago</option>
        <option>Pagada</option>
        <option>Anulada</option>
    </select>
</div>

<!-- MOTIVO ANULACIÓN -->
<div class="grid">
    <input type="text" id="motivoAnulacion" placeholder="Motivo de anulación" style="display:none;">
</div>

<!-- BOTÓN -->
<button type="button" onclick="confirmarPago()">
    Confirmar Pago
</button>

</form>

<script src="modulo3-script.js"></script>

</body>
</html>
