<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Módulo 2 - Pedidos</title>
    <link rel="stylesheet" href="modulo2-styles.css">
</head>
<body>

<h1>Registro de Pedidos</h1>

<form id="formPedido">

    <!-- CÓDIGO -->
    <label>Código:</label>
    <input type="text" id="codigoPedido" readonly>

    <!-- FECHA -->
    <p>Fecha: <span id="fechaPedido"></span></p>

    <!-- DATOS -->
    <div class="grid">
        <input type="text" id="mozo" placeholder="Nombre del mozo" required>
        <input type="number" id="mesa" placeholder="Mesa" min="1" max="50" required>
    </div>

    <!-- AGREGAR PLATO -->
    <div class="fila">
        <select id="platoSelect"></select>
        <input type="number" id="cantidad" placeholder="Cantidad" min="1">
        <input type="text" id="obs" placeholder="Observación" maxlength="150">
        <button type="button" onclick="agregarPlato()">Agregar</button>
    </div>

    <!-- DETALLE -->
    <table>
        <thead>
            <tr>
                <th>Plato</th>
                <th>Cant</th>
                <th>Precio</th>
                <th>Subtotal</th>
                <th>Obs</th>
            </tr>
        </thead>
        <tbody id="detalle"></tbody>
    </table>

    <!-- RESUMEN -->
    <div class="resumen">
        <p>Total: <span>S/ <span id="total">0.00</span></span></p>
        <p>Tiempo estimado: <span id="tiempoTotal">0</span> min</p>
    </div>

    <!-- PRIORIDAD -->
    <div class="grid">
        <select id="prioridad">
            <option>Normal</option>
            <option>Alta</option>
            <option>Urgente</option>
        </select>

        <input type="text" id="justificacion"
        placeholder="Justificación (mín. 10 caracteres)"
        style="display:none;">
    </div>

    <button type="submit">Guardar Pedido</button>
</form>

<h2>Pedidos</h2>

<table>
    <thead>
        <tr>
            <th>Código</th>
            <th>Mesa</th>
            <th>Mozo</th>
            <th>Total</th>
            <th>Prioridad</th> <!-- 🔥 NUEVO -->
            <th>Fecha</th>     <!-- 🔥 NUEVO -->
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody id="tablaPedidos"></tbody>
</table>

<script src="modulo2-script.js"></script>

</body>
</html>
